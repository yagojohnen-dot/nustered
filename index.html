<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo HTML Pronto</title>
    <style>
        body { margin: 0; padding: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f7f7f7; overflow: hidden; }
        #game { width: 600px; height: 200px; border-bottom: 2px solid #535353; position: relative; background-color: white; overflow: hidden; }
        #dino { width: 50px; height: 50px; background-color: #535353; position: absolute; bottom: 0; left: 50px; }
        #obstacle { width: 30px; height: 50px; background-color: #dc2e2e; position: absolute; bottom: 0; left: 600px; animation: moveObstacle 1.5s infinite linear; }
        
        @keyframes moveObstacle {
            0% { left: 600px; }
            100% { left: -40px; }
        }
        
        .jump { animation: jump 0.5s linear; }
        @keyframes jump {
            0% { bottom: 0; }
            30% { bottom: 100px; }
            70% { bottom: 100px; }
            100% { bottom: 0; }
        }
        #score { position: absolute; top: 10px; right: 20px; font-family: Arial; font-size: 20px; }
    </style>
</head>
<body>

    <div id="game">
        <div id="dino"></div>
        <div id="obstacle"></div>
        <div id="score">Pontos: 0</div>
    </div>

    <script>
        const dino = document.getElementById("dino");
        const obstacle = document.getElementById("obstacle");
        const scoreElement = document.getElementById("score");
        let score = 0;

        function jump(e) {
            if (e.code === 'Space' || e.type === 'touchstart') {
                if (!dino.classList.contains("jump")) {
                    dino.classList.add("jump");
                    setTimeout(() => dino.classList.remove("jump"), 500);
                }
            }
        }
        document.addEventListener('keydown', jump);
        document.addEventListener('touchstart', jump);

        let checkDead = setInterval(() => {
            let dinoTop = parseInt(window.getComputedStyle(dino).getPropertyValue("top"));
            let obstacleLeft = parseInt(window.getComputedStyle(obstacle).getPropertyValue("left"));
            
            score++;
            scoreElement.innerText = "Pontos: " + Math.floor(score/10);

            if (obstacleLeft < 50 && obstacleLeft > 0 && dinoTop >= 150) {
                obstacle.style.animation = "none";
                alert("Game Over! Pontuação: " + Math.floor(score/10));
                score = 0;
                obstacle.style.animation = "moveObstacle 1.5s infinite linear";
            }
        }, 10);
    </script>
</body>
</html>
