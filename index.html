<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Survival JS</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            border: 4px solid #333;
            background-color: #000;
            cursor: crosshair;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
        }

        .stat { font-size: 24px; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat">Pontos: <span id="score">0</span></div>
        <div class="stat">Vida: <span id="health">100</span>%</div>
    </div>

    <div id="menu">
    <h1>ZOMBIE SURVIVAL</h1>
    <p>Use WASD para mover e o MOUSE para atirar</p>
    <button id="startBtn">INICIAR JOGO</button>
</div>
    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const healthElement = document.getElementById('health');

        canvas.width = window.innerWidth * 0.8;
        canvas.height = window.innerHeight * 0.8;

        // Estado do Jogo
        let score = 0;
        let health = 100;
        let gameOver = false;

        const player = {
            x: canvas.width / 2,
            y: canvas.height / 2,
            radius: 15,
            color: '#3498db',
            speed: 4
        };

        const projectiles = [];
        const enemies = [];
        const keys = {};

        // Listeners de controles
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('click', shoot);

        function shoot(e) {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            
            projectiles.push({
                x: player.x,
                y: player.y,
                radius: 5,
                color: '#f1c40f',
                velocity: {
                    x: Math.cos(angle) * 10,
                    y: Math.sin(angle) * 10
                }
            });
        }

        function spawnEnemy() {
            if (gameOver) return;
            const radius = 20;
            let x, y;

            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
            }

            const angle = Math.atan2(player.y - y, player.x - x);
            enemies.push({
                x, y, radius, 
                color: '#e74c3c',
                velocity: {
                    x: Math.cos(angle) * 1.5,
                    y: Math.sin(angle) * 1.5
                }
            });
        }

        setInterval(spawnEnemy, 1000);

        function animate() {
            if (health <= 0) {
                alert(`Fim de Jogo! Pontuação: ${score}`);
                document.location.reload();
                return;
            }

            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)'; // Efeito de rastro
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Movimentação Jogador
            if (keys['w'] && player.y > 0) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height) player.y += player.speed;
            if (keys['a'] && player.x > 0) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width) player.x += player.speed;

            // Desenhar Jogador
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();

            // Lógica Projéteis
            projectiles.forEach((p, index) => {
                p.x += p.velocity.x;
                p.y += p.velocity.y;

                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();

                // Remover se sair da tela
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    projectiles.splice(index, 1);
                }
            });

            // Lógica Inimigos
            enemies.forEach((enemy, eIndex) => {
                // Seguir jogador
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.x += Math.cos(angle) * 2;
                enemy.y += Math.sin(angle) * 2;

                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fillStyle = enemy.color;
                ctx.fill();

                // Colisão com Jogador
                const distPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distPlayer - enemy.radius - player.radius < 1) {
                    health -= 0.5;
                    healthElement.innerText = Math.floor(health);
                }

                // Colisão com Projéteis
                projectiles.forEach((p, pIndex) => {
                    const dist = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                    if (dist - enemy.radius - p.radius < 1) {
                        score += 10;
                        scoreElement.innerText = score;
                        enemies.splice(eIndex, 1);
                        projectiles.splice(pIndex, 1);
                    }
                });
            });
        }

        animate();
    </script>
</body>
</html>
