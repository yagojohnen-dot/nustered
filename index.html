<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Jogo de Zumbi</title>
  <style>
    body {
      margin: 0;
      background-color: #111;
      color: white;
      font-family: Arial, sans-serif;
      overflow: hidden;
    }

    canvas {
      display: block;
      background-color: #222;
      margin: 0 auto;
    }
  </style>
</head>
<body>
  <canvas id="gameCanvas" width="800" height="600"></canvas>

  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Jogador
    const player = {
      x: canvas.width / 2,
      y: canvas.height / 2,
      width: 40,
      height: 40,
      speed: 5,
      color: "blue"
    };

    // Tiros
    const bullets = [];

    // Zumbis
    const zombies = [];
    const zombieCount = 5;

    for (let i = 0; i < zombieCount; i++) {
      zombies.push({
        x: Math.random() * canvas.width,
        y: Math.random() * canvas.height,
        width: 40,
        height: 40,
        speed: 1,
        color: "green"
      });
    }

    // Controles do jogador
    const keys = {};
    document.addEventListener("keydown", (e) => keys[e.key] = true);
    document.addEventListener("keyup", (e) => keys[e.key] = false);

    // Atirar com espaço
    document.addEventListener("keydown", (e) => {
      if (e.key === " ") {
        bullets.push({ x: player.x + player.width/2 - 5, y: player.y, width: 10, height: 10, speed: 7 });
      }
    });

    function update() {
      // Movimentação do jogador
      if (keys["ArrowUp"]) player.y -= player.speed;
      if (keys["ArrowDown"]) player.y += player.speed;
      if (keys["ArrowLeft"]) player.x -= player.speed;
      if (keys["ArrowRight"]) player.x += player.speed;

      // Limitar jogador na tela
      player.x = Math.max(0, Math.min(canvas.width - player.width, player.x));
      player.y = Math.max(0, Math.min(canvas.height - player.height, player.y));

      // Atualizar tiros
      for (let i = bullets.length - 1; i >= 0; i--) {
        bullets[i].y -= bullets[i].speed;
        if (bullets[i].y < 0) bullets.splice(i, 1);
      }

      // Atualizar zumbis
      zombies.forEach(zombie => {
        const dx = player.x - zombie.x;
        const dy = player.y - zombie.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        zombie.x += (dx/dist) * zombie.speed;
        zombie.y += (dy/dist) * zombie.speed;
      });

      // Checar colisão dos tiros com zumbis
      for (let i = zombies.length - 1; i >= 0; i--) {
        for (let j = bullets.length - 1; j >= 0; j--) {
          const z = zombies[i];
          const b = bullets[j];
          if (b.x < z.x + z.width && b.x + b.width > z.x &&
              b.y < z.y + z.height && b.y + b.height > z.y) {
            zombies.splice(i, 1);
            bullets.splice(j, 1);
            break;
          }
        }
      }
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Desenhar jogador
      ctx.fillStyle = player.color;
      ctx.fillRect(player.x, player.y, player.width, player.height);

      // Desenhar tiros
      ctx.fillStyle = "yellow";
      bullets.forEach(b => ctx.fillRect(b.x, b.y, b.width, b.height));

      // Desenhar zumbis
      zombies.forEach(z => {
        ctx.fillStyle = z.color;
        ctx.fillRect(z.x, z.y, z.width, z.height);
      });
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    gameLoop();
  </script>
</body>
</html>
