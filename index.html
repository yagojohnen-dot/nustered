<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palavra do Dia - Infinito</title>
    <style>
        :root {
            --bg: #121213;
            --tile-border: #3a3a3c;
            --correct: #538d4e;
            --present: #b59f3b;
            --absent: #3a3a3c;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: var(--bg);
            color: white;
            margin: 0;
            padding: 20px;
        }

        #game-board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            margin-bottom: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .tile {
            width: 55px;
            height: 55px;
            border: 2px solid var(--tile-border);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            text-transform: uppercase;
            transition: transform 0.1s;
        }

        .correct { background-color: var(--correct); border-color: var(--correct); }
        .present { background-color: var(--present); border-color: var(--present); }
        .absent { background-color: var(--absent); border-color: var(--absent); }

        #message {
            font-size: 1.2rem;
            margin-bottom: 10px;
            height: 30px;
            color: #ffd700;
        }

        button {
            padding: 10px 20px;
            background-color: var(--correct);
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>PALAVRA DO DIA</h1>
    <div id="message"></div>
    <div id="game-board"></div>
    <button onclick="reiniciar()">Novo Jogo</button>

    <script>
        // LISTA DE PALAVRAS (Adicione quantas quiser aqui!)
        const LISTA_PALAVRAS = [
            "TERRA", "PLANO", "SAGAZ", "NOBRE", "IDEIA", 
            "AUDAS", "PODER", "MUNDO", "VIVER", "JUSTO",
            "SONHO", "TEMPO", "VALOR", "FORTE", "BRAVO"
        ];

        let palavraCorreta = "";
        let tentativaAtual = 0;
        let letraAtual = 0;
        let grid = ["", "", "", "", "", ""];
        let jogoAtivo = true;

        function iniciarJogo() {
            // Sorteia uma palavra da lista
            palavraCorreta = LISTA_PALAVRAS[Math.floor(Math.random() * LISTA_PALAVRAS.length)].toUpperCase();
            desenharTabuleiro();
        }

        function desenharTabuleiro() {
            const board = document.getElementById("game-board");
            board.innerHTML = ""; // Limpa para reiniciar
            for (let i = 0; i < 6; i++) {
                let row = document.createElement("div");
                row.className = "row";
                for (let j = 0; j < 5; j++) {
                    let tile = document.createElement("div");
                    tile.className = "tile";
                    tile.id = `tile-${i}-${j}`;
                    row.appendChild(tile);
                }
                board.appendChild(row);
            }
        }

        document.addEventListener("keydown", (e) => {
            if (!jogoAtivo) return;
            
            const tecla = e.key.toUpperCase();
            if (tecla === "ENTER") verificarPalavra();
            if (tecla === "BACKSPACE") apagarLetra();
            if (/^[A-ZÁ-Ú]$/.test(tecla) && letraAtual < 5) adicionarLetra(tecla);
        });

        function adicionarLetra(l) {
            const tile = document.getElementById(`tile-${tentativaAtual}-${letraAtual}`);
            tile.innerText = l;
            grid[tentativaAtual] += l;
            letraAtual++;
        }

        function apagarLetra() {
            if (letraAtual > 0) {
                letraAtual--;
                const tile = document.getElementById(`tile-${tentativaAtual}-${letraAtual}`);
                tile.innerText = "";
                grid[tentativaAtual] = grid[tentativaAtual].slice(0, -1);
            }
        }

        function verificarPalavra() {
            const palpite = grid[tentativaAtual];
            if (palpite.length !== 5) return;

            const arrayCorreta = palavraCorreta.split("");
            
            // Primeira passada: marcar Verdes (Correto)
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${tentativaAtual}-${i}`);
                if (palpite[i] === palavraCorreta[i]) {
                    tile.classList.add("correct");
                    arrayCorreta[i] = null; // Remove para não contar no amarelo
                }
            }

            // Segunda passada: marcar Amarelos e Cinzas
            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${tentativaAtual}-${i}`);
                if (tile.classList.contains("correct")) continue;

                if (arrayCorreta.includes(palpite[i])) {
                    tile.classList.add("present");
                    arrayCorreta[arrayCorreta.indexOf(palpite[i])] = null;
                } else {
                    tile.classList.add("absent");
                }
            }

            if (palpite === palavraCorreta) {
                document.getElementById("message").innerText = "Incrível! Você venceu! 🏆";
                jogoAtivo = false;
            } else {
                tentativaAtual++;
                letraAtual = 0;
                if (tentativaAtual === 6) {
                    document.getElementById("message").innerText = `Fim! Era: ${palavraCorreta}`;
                    jogoAtivo = false;
                }
            }
        }

        function reiniciar() {
            tentativaAtual = 0;
            letraAtual = 0;
            grid = ["", "", "", "", "", ""];
            jogoAtivo = true;
            document.getElementById("message").innerText = "";
            iniciarJogo();
        }

        iniciarJogo();
    </script>
</body>
</html>
