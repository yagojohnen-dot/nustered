<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surpresa do Macaco</title>
    <style>
        /* CSS para centralizar tudo na tela */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }

        /* Estilo do Botão Iniciar */
        #btn-iniciar {
            padding: 15px 30px;
            font-size: 20px;
            cursor: pointer;
            background-color: #ff69b4; /* Rosa */
            color: white;
            border: none;
            border-radius: 8px;
            transition: transform 0.2s, background-color 0.2s;
        }

        #btn-iniciar:hover {
            background-color: #ff1493;
            transform: scale(1.1);
        }

        /* Container da Imagem (escondido inicialmente) */
        #container-macaco {
            display: none; 
            text-align: center;
            animation: aparecer 0.5s ease-in-out;
        }

        #container-macaco img {
            max-width: 400px;
            border-radius: 20px;
            border: 5px solid #ff69b4; /* Borda rosa combinando com a boca */
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        /* Animação simples de entrada */
        @keyframes aparecer {
            from { opacity: 0; transform: scale(0.8); }
            to { opacity: 1; transform: scale(1); }
        }
    </style>
</head>
<body>

    <button id="btn-iniciar" onclick="mostrarMacaco()">Iniciar</button>

    <div id="container-macaco">
        <img src="https://images.pexels.com/photos/1207875/pexels-photo-1207875.jpeg?auto=compress&cs=tinysrgb&w=1260&h=750&dpr=1" alt="Macaco com boca rosa">
        <p>🐵 💖</p>
    </div>

    <script>
        function mostrarMacaco() {
            // Esconde o botão
            document.getElementById('btn-iniciar').style.display = 'none';
            // Mostra o container com a foto
            document.getElementById('container-macaco').style.display = 'block';
        }
    </script>

</body>
</html>
