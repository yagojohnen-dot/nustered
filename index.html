<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FPS 3D - Pulo e Luz</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 15px; height: 15px; border: 2px solid #0f0;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none;
        }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #0f0; font-size: 24px; pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 10px;
        }
        #instructions {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; text-align: center;
            background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #0f0;
        }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    <div id="crosshair"></div>
    <div id="instructions">
        <h1>SURVIVAL 3D</h1>
        <p>W, A, S, D - Mover<br>ESPAÇO - Pular<br>MOUSE - Olhar/Atirar</p>
        <button onclick="startGame()" style="padding: 10px 25px; cursor: pointer; background: #0f0; border: none; font-weight: bold;">JOGAR</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, score = 0;
        let targets = [];
        const keys = {};
        
        // Variáveis de física
        let verticalVelocity = 0;
        const gravity = 0.008;
        const jumpForce = 0.2;
        const playerHeight = 1.6;
        let canJump = true;

        function init() {
            scene = new THREE.Scene();
            // 1. FICAR MAIS CLARO: Cor de fundo mais cinza e névoa reduzida
            scene.background = new THREE.Color(0x333333); 
            scene.fog = new THREE.Fog(0x333333, 0, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = playerHeight;

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // 2. MAIS LUZ: Adicionando luz ambiente forte e uma luz direcional
            const ambientLight = new THREE.AmbientLight(0xffffff, 1.2); 
            scene.add(ambientLight);

            const sunLight = new THREE.DirectionalLight(0xffffff, 1.0);
            sunLight.position.set(10, 20, 10);
            scene.add(sunLight);

            // Chão mais visível
            const grid = new THREE.GridHelper(200, 50, 0x00ff00, 0x555555);
            scene.add(grid);

            for(let i=0; i<15; i++) spawnTarget();

            animate();
        }

        function spawnTarget() {
            const geo = new THREE.BoxGeometry(1.5, 1.5, 1.5);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff4444 });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.position.set((Math.random()-0.5)*80, 0.75, (Math.random()-0.5)*80);
            scene.add(mesh);
            targets.push(mesh);
        }

        // Mouse Lock e Rotação
        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Tiro
        const raycaster = new THREE.Raycaster();
        window.addEventListener('mousedown', () => {
            if (!document.pointerLockElement) return;
            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(targets);
            if (hits.length > 0) {
                hits[0].object.position.set((Math.random()-0.5)*80, 0.75, (Math.random()-0.5)*80);
                score += 10;
                document.getElementById('score').innerText = score;
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            // Movimentação Horizontal
            const moveSpeed = 0.15;
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            direction.y = 0; direction.normalize();
            const side = new THREE.Vector3().crossVectors(camera.up, direction).normalize();

            if (keys['KeyW']) camera.position.addScaledVector(direction, moveSpeed);
            if (keys['KeyS']) camera.position.addScaledVector(direction, -moveSpeed);
            if (keys['KeyA']) camera.position.addScaledVector(side, moveSpeed);
            if (keys['KeyD']) camera.position.addScaledVector(side, -moveSpeed);

            // 3. LOGICA DE PULO E GRAVIDADE
            if (keys['Space'] && canJump) {
                verticalVelocity = jumpForce;
                canJump = false;
            }

            camera.position.y += verticalVelocity;
            
            if (camera.position.y > playerHeight) {
                verticalVelocity -= gravity; // Aplicando gravidade
            } else {
                camera.position.y = playerHeight; // Tocou o chão
                verticalVelocity = 0;
                canJump = true;
            }

            renderer.render(scene, camera);
        }

        window.startGame = () => {
            document.body.requestPointerLock();
            document.getElementById('instructions').style.display = 'none';
        };

        init();
    </script>
</body>
</html>
