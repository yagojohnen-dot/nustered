<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Zombie Apocalypse - Survival</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #050505;
            color: #eee;
            font-family: 'Verdana', sans-serif;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-container {
            position: relative;
            margin-top: 20px;
            box-shadow: 0 0 50px rgba(255, 0, 0, 0.2);
        }

        canvas {
            background-color: #111;
            border: 5px solid #333;
            display: block;
            cursor: crosshair;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            pointer-events: none;
            text-shadow: 2px 2px 4px #000;
        }

        .info { font-size: 20px; font-weight: bold; color: #ff4d4d; }
        
        #menu-inicial {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            background: rgba(0,0,0,0.8);
            padding: 30px;
            border: 2px solid #ff4d4d;
        }

        button {
            padding: 10px 25px;
            font-size: 18px;
            font-weight: bold;
            background: #ff4d4d;
            color: white;
            border: none;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover { background: #cc0000; }
    </style>
</head>
<body>

    <div id="game-container">
        <canvas id="canvas"></canvas>
        
        <div id="ui">
            <div class="info">Zumbis Eliminados: <span id="score">0</span></div>
            <div class="info">Integridade: <span id="health">100</span>%</div>
        </div>

        <div id="menu-inicial">
            <h1>ZOMBIE SURVIVAL</h1>
            <p>Use WASD para mover e MOUSE para atirar.</p>
            <button onclick="startGame()">INICIAR COMBATE</button>
        </div>
    </div>
