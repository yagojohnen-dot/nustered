<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Jogo de Carro Simples</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #333; }
        
        .game-area {
            width: 400px;
            height: 100vh;
            background-color: #555;
            margin: 0 auto;
            position: relative;
            border-left: 10px dashed #fff;
            border-right: 10px dashed #fff;
            overflow: hidden;
        }

        .car {
            width: 50px;
            height: 80px;
            background-color: red;
            position: absolute;
            bottom: 20px;
            left: 175px;
            border-radius: 10px;
            box-shadow: 0 5px 5px rgba(0,0,0,0.5);
            /* Simples movimentação com teclas seria com JS, aqui simulamos o posicionamento */
        }

        .obstacle {
            width: 50px;
            height: 50px;
            background-color: yellow;
            position: absolute;
            top: -60px;
            left: 175px;
            border-radius: 5px;
            animation: moveObstacle 2s linear infinite;
        }

        @keyframes moveObstacle {
            0% { top: -60px; }
            100% { top: 100vh; }
        }

        /* Linhas da estrada animadas */
        .game-area::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 100vh;
            left: 50%;
            transform: translateX(-50%);
            background: repeating-linear-gradient(
                to bottom,
                #fff,
                #fff 50px,
                transparent 50px,
                transparent 100px
            );
            animation: roadMove 1s linear infinite;
        }

        @keyframes roadMove {
            0% { top: 0; }
            100% { top: 100px; }
        }
    </style>
</head>
<body>

    <div class="game-area">
        <div class="car"></div>
        <div class="obstacle"></div>
    </div>

</body>
</html>
