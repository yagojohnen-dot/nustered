<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FPS 3D Survival</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Courier New', Courier, monospace; }
        
        /* Interface de Mira */
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 20px; height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.7);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }

        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #0f0; font-size: 24px; pointer-events: none;
        }

        #instructions {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; text-align: center;
            background: rgba(0,0,0,0.8); padding: 20px; border: 1px solid #0f0;
        }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    <div id="crosshair"></div>
    <div id="instructions">
        <h1>MISSAO 3D</h1>
        <p>W, A, S, D - Movimentar<br>MOUSE - Mirar<br>CLIQUE - Atirar</p>
        <button onclick="startGame()" style="padding: 10px 20px; cursor: pointer;">INICIAR</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, score = 0;
        let targets = [];
        const moveSpeed = 0.15;
        const keys = {};

        // Configuração inicial
        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050505);
            scene.fog = new THREE.Fog(0x000, 0, 50);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.y = 1.6; // Altura dos olhos

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Luzes
            const light = new THREE.HemisphereLight(0xffffff, 0x444444, 2);
            scene.add(light);

            // Chão (Grid Estilizado)
            const grid = new THREE.GridHelper(200, 100, 0x00ff00, 0x222222);
            scene.add(grid);

            // Criar Alvos
            for(let i=0; i<20; i++) spawnTarget();

            animate();
        }

        function spawnTarget() {
            const geo = new THREE.BoxGeometry(1, 2, 1);
            const mat = new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 });
            const mesh = new THREE.Mesh(geo, mat);
            
            mesh.position.set(
                (Math.random() - 0.5) * 60,
                1,
                (Math.random() - 0.5) * 60
            );
            scene.add(mesh);
            targets.push(mesh);
        }

        // Lógica de Movimentação e Rotação
        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2.1, Math.min(Math.PI/2.1, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        // Sistema de Tiro (Raycasting)
        const raycaster = new THREE.Raycaster();
        const center = new THREE.Vector2(0, 0);

        window.addEventListener('mousedown', () => {
            if (!document.pointerLockElement) return;

            raycaster.setFromCamera(center, camera);
            const hits = raycaster.intersectObjects(targets);

            if (hits.length > 0) {
                const obj = hits[0].object;
                score += 10;
                document.getElementById('score').innerText = score;
                
                // "Explosão" simples: reseta posição
                obj.position.set((Math.random()-0.5)*60, 1, (Math.random()-0.5)*60);
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            // Movimento relativo à direção da câmera
            const direction = new THREE.Vector3();
            camera.getWorldDirection(direction);
            direction.y = 0; direction.normalize();

            const side = new THREE.Vector3().crossVectors(camera.up, direction).normalize();

            if (keys['KeyW']) camera.position.addScaledVector(direction, moveSpeed);
            if (keys['KeyS']) camera.position.addScaledVector(direction, -moveSpeed);
            if (keys['KeyA']) camera.position.addScaledVector(side, moveSpeed);
            if (keys['KeyD']) camera.position.addScaledVector(side, -moveSpeed);

            renderer.render(scene, camera);
        }

        // Iniciar Jogo e Capturar Mouse
        window.startGame = () => {
            document.body.requestPointerLock();
            document.getElementById('instructions').style.display = 'none';
        };

        init();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
