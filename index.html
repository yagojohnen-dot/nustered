<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>FPS 3D - Alvos Móveis</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #333; font-family: sans-serif; }
        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 12px; height: 12px; border: 2px solid #0f0;
            border-radius: 50%; transform: translate(-50%, -50%);
            pointer-events: none; z-index: 10;
        }
        #ui {
            position: absolute; top: 20px; left: 20px;
            color: #0f0; font-size: 24px; pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 10px; border-radius: 5px;
        }
        #instructions {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: white; text-align: center;
            background: rgba(0,0,0,0.9); padding: 30px; border: 2px solid #0f0;
            z-index: 20;
        }
    </style>
</head>
<body>

    <div id="ui">Score: <span id="score">0</span></div>
    <div id="crosshair"></div>
    <div id="instructions">
        <h1>BATTLE 3D</h1>
        <p>W, A, S, D - Mover | ESPAÇO - Pular<br>CLIQUE - Atirar</p>
        <button onclick="startGame()" style="padding: 10px 25px; cursor: pointer; background: #0f0; border: none; font-weight: bold;">INICIAR</button>
    </div>

    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>

    <script type="module">
        import * as THREE from 'three';

        let scene, camera, renderer, score = 0;
        let targets = [];
        const keys = {};
        
        let verticalVelocity = 0;
        const gravity = 0.008, jumpForce = 0.18, playerHeight = 1.6;
        let canJump = true;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x111111);
            scene.fog = new THREE.Fog(0x111111, 0, 100);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, playerHeight, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            scene.add(new THREE.AmbientLight(0xffffff, 0.8));
            const sun = new THREE.DirectionalLight(0xffffff, 1.2);
            sun.position.set(10, 20, 10);
            scene.add(sun);

            scene.add(new THREE.GridHelper(200, 50, 0x444444, 0x222222));

            // Criar obstáculos (blocos para eles se esconderem)
            for(let i=0; i<10; i++) {
                createObstacle();
            }

            // Criar alvos móveis
            for(let i=0; i<10; i++) {
                spawnTarget();
            }

            scene.add(camera); 
            animate();
        }

        function createObstacle() {
            const geo = new THREE.BoxGeometry(4, 6, 2);
            const mat = new THREE.MeshStandardMaterial({ color: 0x444444 });
            const block = new THREE.Mesh(geo, mat);
            block.position.set((Math.random()-0.5)*60, 3, (Math.random()-0.5)*60);
            scene.add(block);
        }

        function spawnTarget() {
            const mesh = new THREE.Mesh(
                new THREE.BoxGeometry(1.2, 1.2, 1.2),
                new THREE.MeshStandardMaterial({ color: 0xff0000, emissive: 0x330000 })
            );
            
            // Posição inicial
            mesh.position.set((Math.random()-0.5)*60, 0.6, (Math.random()-0.5)*60);
            
            // Propriedades de movimento personalizadas
            mesh.userData = {
                direction: new THREE.Vector3((Math.random()-0.5), 0, (Math.random()-0.5)).normalize(),
                speed: 0.05 + Math.random() * 0.1,
                timer: 0
            };

            scene.add(mesh);
            targets.push(mesh);
        }

        // Movimentação dos alvos
        function updateTargets() {
            targets.forEach(t => {
                t.position.addScaledVector(t.userData.direction, t.userData.speed);
                t.userData.timer++;

                // Mudar de direção aleatoriamente ou se afastar demais do centro
                if(t.userData.timer > 100 || t.position.length() > 50) {
                    t.userData.direction.x = (Math.random()-0.5);
                    t.userData.direction.z = (Math.random()-0.5);
                    t.userData.direction.normalize();
                    t.userData.timer = 0;
                }
            });
        }

        // Controles de câmera
        let yaw = 0, pitch = 0;
        document.addEventListener('mousemove', (e) => {
            if (document.pointerLockElement) {
                yaw -= e.movementX * 0.002;
                pitch -= e.movementY * 0.002;
                pitch = Math.max(-Math.PI/2, Math.min(Math.PI/2, pitch));
                camera.rotation.set(pitch, yaw, 0, 'YXZ');
            }
        });

        window.addEventListener('keydown', (e) => keys[e.code] = true);
        window.addEventListener('keyup', (e) => keys[e.code] = false);

        const raycaster = new THREE.Raycaster();
        window.addEventListener('mousedown', () => {
            if (!document.pointerLockElement) return;

            raycaster.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = raycaster.intersectObjects(targets);
            if (hits.length > 0) {
                // Ao acertar, teleporta para outro lugar (simulando respawn)
                hits[0].object.position.set((Math.random()-0.5)*60, 0.6, (Math.random()-0.5)*60);
                score += 10;
                document.getElementById('score').innerText = score;
            }
        });

        function animate() {
            requestAnimationFrame(animate);

            updateTargets(); // Move os inimigos

            // Movimento do Jogador
            const speed = 0.15;
            const dir = new THREE.Vector3();
            camera.getWorldDirection(dir);
            dir.y = 0; dir.normalize();
            const side = new THREE.Vector3().crossVectors(camera.up, dir).normalize();

            if (keys['KeyW']) camera.position.addScaledVector(dir, speed);
            if (keys['KeyS']) camera.position.addScaledVector(dir, -speed);
            if (keys['KeyA']) camera.position.addScaledVector(side, speed);
            if (keys['KeyD']) camera.position.addScaledVector(side, -speed);

            if (keys['Space'] && canJump) {
                verticalVelocity = jumpForce;
                canJump = false;
            }
            camera.position.y += verticalVelocity;
            if (camera.position.y > playerHeight) {
                verticalVelocity -= gravity;
            } else {
                camera.position.y = playerHeight;
                verticalVelocity = 0;
                canJump = true;
            }

            renderer.render(scene, camera);
        }

        window.startGame = () => {
            document.body.requestPointerLock();
            document.getElementById('instructions').style.display = 'none';
        };

        init();
    </script>
</body>
</html>
