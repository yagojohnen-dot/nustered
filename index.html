<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Survival - Grass Edition</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            border: 4px solid #2d5a27;
            background-color: #4CAF50; /* Cor base do gramado */
            cursor: crosshair;
            display: none;
        }

        #startMenu {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), 
                        url('4-Space-Shooter-UI7.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .menu-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 3px solid #4CAF50;
            border-radius: 15px;
            text-align: center;
        }

        #startButton {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #4CAF50;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            display: none;
            text-shadow: 2px 2px #000;
        }
    </style>
</head>
<body>

    <div id="startMenu">
        <div class="menu-box">
            <h1 style="color: #4CAF50;">ZOMBIE GARDEN</h1>
            <p>Zumbis Roxos são maiores e aguentam 3 tiros!</p>
            <button id="startButton">INICIAR CAÇA</button>
        </div>
    </div>

    <div id="ui">
        <div style="font-size: 24px;">Pontos: <span id="score">0</span></div>
        <div style="font-size: 24px;">Vida: <span id="health">100</span>%</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const healthElement = document.getElementById('health');
        const startMenu = document.getElementById('startMenu');
        const startButton = document.getElementById('startButton');
        const uiElement = document.getElementById('ui');

        canvas.width = window.innerWidth * 0.9;
        canvas.height = window.innerHeight * 0.9;

        let score, health, gameOver, gameRunning = false;
        let player, projectiles, enemies, grassPatches;
        const keys = {};

        // Criar grama aleatória para o fundo
        function createGrassTexture() {
            grassPatches = [];
            for (let i = 0; i < 100; i++) {
                grassPatches.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    width: Math.random() * 3 + 2,
                    height: Math.random() * 10 + 5
                });
            }
        }

        function initGame() {
            score = 0;
            health = 100;
            gameOver = false;
            gameRunning = true;
            player = { x: canvas.width / 2, y: canvas.height / 2, radius: 15, color: '#3498db', speed: 4 };
            projectiles = [];
            enemies = [];
            createGrassTexture();
            
            scoreElement.innerText = score;
            healthElement.innerText = health;
            canvas.style.display = 'block';
            uiElement.style.display = 'block';
            startMenu.style.display = 'none';
            animate();
        }

        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('click', shoot);
        startButton.addEventListener('click', initGame);

        function shoot(e) {
            if (!gameRunning || gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const angle = Math.atan2((e.clientY - rect.top) - player.y, (e.clientX - rect.left) - player.x);
            projectiles.push({
                x: player.x, y: player.y, radius: 5, color: '#f1c40f',
                velocity: { x: Math.cos(angle) * 10, y: Math.sin(angle) * 10 }
            });
        }

        function spawnEnemy() {
            if (!gameRunning || gameOver) return;
            
            // Lógica do Zumbi Grande (20% de chance)
            const isBig = Math.random() < 0.2;
            const radius = isBig ? 35 : 20;
            const enemyHealth = isBig ? 3 : 1;
            const speed = isBig ? 0.8 : 2; // Zumbi grande é mais lento
            const color = isBig ? '#8e44ad' : '#e74c3c'; // Roxo para o grande

            let x, y;
            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
            }

            const angle = Math.atan2(player.y - y, player.x - x);
            enemies.push({
                x, y, radius, color, speed, health: enemyHealth,
                velocity: { x: Math.cos(angle) * speed, y: Math.sin(angle) * speed }
            });
        }

        setInterval(spawnEnemy, 1000);

        function drawBackground() {
            // Fundo verde escuro
            ctx.fillStyle = '#388E3C';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            
            // Desenhar "folhas" de grama
            ctx.fillStyle = '#4CAF50';
            grassPatches.forEach(patch => {
                ctx.fillRect(patch.x, patch.y, patch.width, patch.height);
            });
        }

        function animate() {
            if (!gameRunning) return;

            if (health <= 0) {
                gameRunning = false;
                alert(`FIM DE JOGO! Você protegeu o jardim e fez ${score} pontos.`);
                location.reload();
                return;
            }

            requestAnimationFrame(animate);
            drawBackground();

            // Jogador
            if (keys['w'] && player.y > 0) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height) player.y += player.speed;
            if (keys['a'] && player.x > 0) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width) player.x += player.speed;

            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();

            // Projéteis
            projectiles.forEach((p, i) => {
                p.x += p.velocity.x;
                p.y += p.velocity.y;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();
                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) projectiles.splice(i, 1);
            });

            // Inimigos
            enemies.forEach((enemy, eIndex) => {
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.x += Math.cos(angle) * enemy.speed;
                enemy.y += Math.sin(angle) * enemy.speed;

                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fillStyle = enemy.color;
                ctx.fill();
                
                // Borda para o zumbi grande parecer mais forte
                if (enemy.radius > 30) {
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }

                // Dano no jogador
                if (Math.hypot(player.x - enemy.x, player.y - enemy.y) < player.radius + enemy.radius) {
                    health -= 0.5;
                    healthElement.innerText = Math.floor(health);
                }

                // Hit no inimigo
                projectiles.forEach((p, pIndex) => {
                    if (Math.hypot(p.x - enemy.x, p.y - enemy.y) < p.radius + enemy.radius) {
                        projectiles.splice(pIndex, 1);
                        enemy.health--; // Tira 1 de vida

                        if (enemy.health <= 0) {
                            score += (enemy.radius > 30) ? 50 : 10;
                            scoreElement.innerText = score;
                            enemies.splice(eIndex, 1);
                        }
                    }
                });
            });
        }
    </script>
</body>
</html>
