<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Desafio do Timão</title>
    <style>
        /* Fundo Preto com Estrelas */
        body {
            margin: 0;
            padding: 0;
            background: #000;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        /* Gerador de estrelas simples usando box-shadow */
        .stars {
            width: 1px;
            height: 1px;
            background: transparent;
            box-shadow: 400px 200px #FFF, 800px 400px #FFF, 1200px 600px #FFF, 200px 800px #FFF, 1500px 100px #FFF, 300px 300px #FFF, 900px 700px #FFF;
            animation: move-stars 50s linear infinite;
        }

        @keyframes move-stars {
            from { transform: translateY(0); }
            to { transform: translateY(-1000px); }
        }

        /* Container do Jogo */
        #game-container {
            text-align: center;
            z-index: 10;
        }

        /* O Gol */
        .gol {
            width: 250px;
            height: 150px;
            border: 5px solid white;
            border-bottom: none;
            margin: 0 auto 50px;
            position: relative;
            background: rgba(255, 255, 255, 0.1);
        }

        /* A Bola */
        #bola {
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin: 0 auto;
            display: block;
            border: 2px solid #000;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        /* Botão do Corinthians (Escondido) */
        #btn-corinthians {
            display: none;
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: #000;
            background-color: #fff;
            border: 2px solid #333;
            border-radius: 5px;
            text-decoration: none;
            cursor: pointer;
            animation: bounce 0.5s infinite alternate;
        }

        #btn-corinthians:hover {
            background-color: #ccc;
        }

        @keyframes bounce {
            from { transform: scale(1); }
            to { transform: scale(1.05); }
        }

        h2 { text-shadow: 2px 2px 4px #000; }
    </style>
</head>
<body>

    <div class="stars"></div>

    <div id="game-container">
        <h2 id="instrucao">Clique na bola para fazer o gol!</h2>
        
        <div class="gol" id="trave"></div>
        
        <div id="bola" onclick="chutar()">⚽</div>

        <br>
        
        <a href="https://www.corinthians.com.br" id="btn-corinthians" target="_blank">
            VAI CORINTHIANS! ACESSAR SITE
        </a>
    </div>

    <script>
        function chutar() {
            const bola = document.getElementById('bola');
            const instrucao = document.getElementById('instrucao');
            const botao = document.getElementById('btn-corinthians');

            // Animação de chute (sobe para o gol)
            bola.style.transform = "translateY(-220px) scale(0.6)";
            
            setTimeout(() => {
                bola.style.display = 'none';
                instrucao.innerHTML = "GOOOOOL! 🦅";
                botao.style.display = 'inline-block';
            }, 500);
        }
    </script>

</body>
</html>
