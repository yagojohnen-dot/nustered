<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Super Jogo de Carro</title>
    <style>
        body { margin: 0; padding: 0; overflow: hidden; background-color: #333; font-family: sans-serif; }
        
        .game-area {
            width: 400px;
            height: 100vh;
            background-color: #555;
            margin: 0 auto;
            position: relative;
            border-left: 10px dashed #fff;
            border-right: 10px dashed #fff;
            overflow: hidden;
        }

        .car {
            width: 50px;
            height: 80px;
            background-color: red;
            position: absolute;
            bottom: 20px;
            left: 175px;
            border-radius: 10px;
            z-index: 2;
            box-shadow: 0 5px 5px rgba(0,0,0,0.5);
        }

        .obstacle {
            width: 50px;
            height: 80px;
            background-color: yellow;
            position: absolute;
            border-radius: 5px;
            z-index: 1;
        }

        .hud {
            position: fixed;
            top: 10px;
            left: 10px;
            color: white;
            background: rgba(0,0,0,0.7);
            padding: 15px;
            border-radius: 8px;
            pointer-events: none;
        }

        /* Animação da estrada */
        .game-area::before {
            content: '';
            position: absolute;
            width: 10px;
            height: 200vh;
            left: 50%;
            top: -100vh;
            transform: translateX(-50%);
            background: repeating-linear-gradient(to bottom, #fff, #fff 50px, transparent 50px, transparent 100px);
            animation: roadMove var(--road-speed, 0.5s) linear infinite;
        }

        @keyframes roadMove {
            0% { transform: translateX(-50%) translateY(0); }
            100% { transform: translateX(-50%) translateY(100px); }
        }
    </style>
</head>
<body>

    <div class="hud">
        <div>Controles: <b>W, A, S, D</b></div>
        <hr>
        <div id="score">Carros Desviados: 0</div>
        <div id="speed-lvl">Velocidade: 1x</div>
    </div>

    <div class="game-area" id="road">
        <div class="car" id="player"></div>
    </div>

    <script>
        const road = document.getElementById('road');
        const car = document.getElementById('player');
        const scoreDisplay = document.getElementById('score');
        const speedDisplay = document.getElementById('speed-lvl');

        let posX = 175;
        let posY = 20;
        let playerSpeed = 7;
        let obstacleSpeed = 5;
        let score = 0;
        let gameActive = true;
        
        const keys = {};
        let obstacles = [];

        // Configuração
        const maxObstacles = 3; 

        window.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);

        function createObstacle() {
            const obs = document.createElement('div');
            obs.classList.add('obstacle');
            obs.style.left = Math.floor(Math.random() * 350) + 'px';
            obs.style.top = '-100px';
            road.appendChild(obs);
            
            return {
                element: obs,
                y: -100,
                x: parseInt(obs.style.left)
            };
        }

        function checkCollision(rect1, rect2) {
            return !(rect1.top > rect2.bottom || rect1.bottom < rect2.top || 
                     rect1.left > rect2.right || rect1.right < rect2.left);
        }

        function gameLoop() {
            if (!gameActive) return;

            // 1. Movimentação do Jogador
            if (keys['a'] && posX > 0) posX -= playerSpeed;
            if (keys['d'] && posX < 350) posX += playerSpeed;
            if (keys['w'] && posY < 500) posY += playerSpeed;
            if (keys['s'] && posY > 0) posY -= playerSpeed;

            car.style.left = posX + 'px';
            car.style.bottom = posY + 'px';

            // 2. Gerenciar Obstáculos
            if (obstacles.length < maxObstacles && Math.random() < 0.02) {
                obstacles.push(createObstacle());
            }

            const playerRect = car.getBoundingClientRect();

            obstacles.forEach((obs, index) => {
                obs.y += obstacleSpeed;
                obs.element.style.top = obs.y + 'px';

                // Detectar Colisão
                const obsRect = obs.element.getBoundingClientRect();
                if (checkCollision(playerRect, obsRect)) {
                    gameOver();
                }

                // Se o obstáculo passou da tela
                if (obs.y > window.innerHeight) {
                    road.removeChild(obs.element);
                    obstacles.splice(index, 1);
                    updateScore();
                }
            });

            requestAnimationFrame(gameLoop);
        }

        function updateScore() {
            score++;
            scoreDisplay.innerText = `Carros Desviados: ${score}`;
            
            // A cada 5 carros, aumenta a velocidade
            if (score % 5 === 0) {
                obstacleSpeed += 0.8;
                playerSpeed += 0.2; // Aumenta um pouco a resposta do jogador
                speedDisplay.innerText = `Velocidade: ${(obstacleSpeed/5).toFixed(1)}x`;
                
                // Acelera a animação visual da estrada
                const animSpeed = 0.5 / (obstacleSpeed / 5);
                document.documentElement.style.setProperty('--road-speed', animSpeed + 's');
            }
        }

        function gameOver() {
            gameActive = false;
            alert(`Bateu! Você desviou de ${score} carros.`);
            location.reload();
        }

        gameLoop();
    </script>
</body>
</html>
