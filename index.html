<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Palavra do Dia</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            background-color: #121213;
            color: white;
        }

        #game-board {
            display: grid;
            grid-template-rows: repeat(6, 1fr);
            gap: 5px;
            margin-top: 20px;
        }

        .row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 5px;
        }

        .tile {
            width: 50px;
            height: 50px;
            border: 2px solid #3a3a3c;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            font-weight: bold;
            text-transform: uppercase;
        }

        /* Cores de feedback */
        .correct { background-color: #538d4e; border-color: #538d4e; }
        .present { background-color: #b59f3b; border-color: #b59f3b; }
        .absent { background-color: #3a3a3c; border-color: #3a3a3c; }

        #message {
            margin-top: 20px;
            font-weight: bold;
            height: 24px;
        }
    </style>
</head>
<body>

    <h1>PALAVRA DO DIA</h1>
    
    <div id="game-board"></div>
    <div id="message"></div>

    <script>
        const PALAVRA_CORRETA = "TERRA"; // Você pode mudar a palavra aqui
        let tentativaAtual = 0;
        let letraAtual = 0;
        let grid = ["", "", "", "", "", ""];

        const board = document.getElementById("game-board");

        // Criar o tabuleiro
        for (let i = 0; i < 6; i++) {
            let row = document.createElement("div");
            row.className = "row";
            for (let j = 0; j < 5; j++) {
                let tile = document.createElement("div");
                tile.className = "tile";
                tile.id = `tile-${i}-${j}`;
                row.appendChild(tile);
            }
            board.appendChild(row);
        }

        // Escutar teclas
        document.addEventListener("keydown", (e) => {
            const tecla = e.key.toUpperCase();

            if (tecla === "ENTER") {
                verificarPalavra();
            } else if (tecla === "BACKSPACE") {
                apagarLetra();
            } else if (/^[A-Z]$/.test(tecla) && letraAtual < 5) {
                adicionarLetra(tecla);
            }
        });

        function adicionarLetra(l) {
            if (tentativaAtual < 6) {
                const tile = document.getElementById(`tile-${tentativaAtual}-${letraAtual}`);
                tile.innerText = l;
                grid[tentativaAtual] += l;
                letraAtual++;
            }
        }

        function apagarLetra() {
            if (letraAtual > 0) {
                letraAtual--;
                const tile = document.getElementById(`tile-${tentativaAtual}-${letraAtual}`);
                tile.innerText = "";
                grid[tentativaAtual] = grid[tentativaAtual].slice(0, -1);
            }
        }

        function verificarPalavra() {
            const palpite = grid[tentativaAtual];
            if (palpite.length !== 5) return;

            for (let i = 0; i < 5; i++) {
                const tile = document.getElementById(`tile-${tentativaAtual}-${i}`);
                const letra = palpite[i];

                if (letra === PALAVRA_CORRETA[i]) {
                    tile.classList.add("correct");
                } else if (PALAVRA_CORRETA.includes(letra)) {
                    tile.classList.add("present");
                } else {
                    tile.classList.add("absent");
                }
            }

            if (palpite === PALAVRA_CORRETA) {
                document.getElementById("message").innerText = "Parabéns! Você acertou! 🎉";
                tentativaAtual = 7; // Bloqueia o jogo
            } else {
                tentativaAtual++;
                letraAtual = 0;
                if (tentativaAtual === 6) {
                    document.getElementById("message").innerText = `Fim de jogo! A palavra era ${PALAVRA_CORRETA}`;
                }
            }
        }
    </script>
</body>
</html>
