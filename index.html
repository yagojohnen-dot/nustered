<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Survival JS</title>
    <style>
        body {
            margin: 0;
            background-color: #1a1a1a;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        canvas {
            border: 4px solid #333;
            background-color: #000;
            cursor: crosshair;
            display: none; /* Escondido até o jogo começar */
        }

        /* MENU INICIAL */
        #startMenu {
            position: absolute;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('4-Space-Shooter-UI7.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        .menu-box {
            background: rgba(0, 0, 0, 0.8);
            padding: 40px;
            border: 2px solid #3498db;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 0 20px #3498db;
        }

        h1 { font-size: 48px; color: #e74c3c; margin-top: 0; }

        #startButton {
            padding: 15px 40px;
            font-size: 24px;
            background-color: #2ecc71;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        #startButton:hover {
            background-color: #27ae60;
            transform: scale(1.1);
        }

        /* Interface do Jogo (HUD) */
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            pointer-events: none;
            display: none;
        }

        .stat { font-size: 24px; margin-bottom: 5px; text-shadow: 2px 2px #000; }
    </style>
</head>
<body>

    <div id="startMenu">
        <div class="menu-box">
            <h1>ZOMBIE ATTACK</h1>
            <p>Use WASD para mover e o MOUSE para atirar.</p>
            <button id="startButton">INICIAR JOGO</button>
        </div>
    </div>

    <div id="ui">
        <div class="stat">Pontos: <span id="score">0</span></div>
        <div class="stat">Vida: <span id="health">100</span>%</div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const healthElement = document.getElementById('health');
        const startMenu = document.getElementById('startMenu');
        const startButton = document.getElementById('startButton');
        const uiElement = document.getElementById('ui');

        canvas.width = window.innerWidth * 0.8;
        canvas.height = window.innerHeight * 0.8;

        // Variáveis de Estado
        let score, health, gameOver, gameRunning = false;
        let player, projectiles, enemies;
        const keys = {};

        // Inicialização/Reset das variáveis do jogo
        function initGame() {
            score = 0;
            health = 100;
            gameOver = false;
            gameRunning = true;
            
            player = {
                x: canvas.width / 2,
                y: canvas.height / 2,
                radius: 15,
                color: '#3498db',
                speed: 4
            };

            projectiles.length = 0; // Limpa arrays sem criar novos (performance)
            enemies.length = 0;

            // Atualiza UI visualmente
            scoreElement.innerText = score;
            healthElement.innerText = health;
            
            // Exibe o Canvas e o HUD
            canvas.style.display = 'block';
            uiElement.style.display = 'block';
            startMenu.style.display = 'none';

            animate(); // Começa o loop
        }

        projectiles = [];
        enemies = [];

        // Controles
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);
        window.addEventListener('click', shoot);
        startButton.addEventListener('click', initGame);

        function shoot(e) {
            if (!gameRunning || gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            
            projectiles.push({
                x: player.x,
                y: player.y,
                radius: 5,
                color: '#f1c40f',
                velocity: {
                    x: Math.cos(angle) * 10,
                    y: Math.sin(angle) * 10
                }
            });
        }

        function spawnEnemy() {
            if (!gameRunning || gameOver) return;
            const radius = 20;
            let x, y;

            if (Math.random() < 0.5) {
                x = Math.random() < 0.5 ? 0 - radius : canvas.width + radius;
                y = Math.random() * canvas.height;
            } else {
                x = Math.random() * canvas.width;
                y = Math.random() < 0.5 ? 0 - radius : canvas.height + radius;
            }

            const angle = Math.atan2(player.y - y, player.x - x);
            enemies.push({
                x, y, radius, 
                color: '#e74c3c',
                velocity: {
                    x: Math.cos(angle) * 1.5,
                    y: Math.sin(angle) * 1.5
                }
            });
        }

        setInterval(spawnEnemy, 1000);

        function animate() {
            if (!gameRunning) return;

            if (health <= 0) {
                gameOver = true;
                gameRunning = false;
                alert(`Fim de Jogo! Pontuação: ${score}`);
                // Ao dar OK no alert, ele volta para o menu
                canvas.style.display = 'none';
                uiElement.style.display = 'none';
                startMenu.style.display = 'flex';
                return;
            }

            requestAnimationFrame(animate);
            ctx.fillStyle = 'rgba(0, 0, 0, 0.2)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Movimento Jogador
            if (keys['w'] && player.y > 0) player.y -= player.speed;
            if (keys['s'] && player.y < canvas.height) player.y += player.speed;
            if (keys['a'] && player.x > 0) player.x -= player.speed;
            if (keys['d'] && player.x < canvas.width) player.x += player.speed;

            // Desenhar Jogador
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.radius, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();

            // Projéteis
            projectiles.forEach((p, index) => {
                p.x += p.velocity.x;
                p.y += p.velocity.y;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = p.color;
                ctx.fill();

                if (p.x < 0 || p.x > canvas.width || p.y < 0 || p.y > canvas.height) {
                    projectiles.splice(index, 1);
                }
            });

            // Inimigos
            enemies.forEach((enemy, eIndex) => {
                const angle = Math.atan2(player.y - enemy.y, player.x - enemy.x);
                enemy.x += Math.cos(angle) * 2;
                enemy.y += Math.sin(angle) * 2;

                ctx.beginPath();
                ctx.arc(enemy.x, enemy.y, enemy.radius, 0, Math.PI * 2);
                ctx.fillStyle = enemy.color;
                ctx.fill();

                // Dano no jogador
                const distPlayer = Math.hypot(player.x - enemy.x, player.y - enemy.y);
                if (distPlayer - enemy.radius - player.radius < 1) {
                    health -= 0.5;
                    healthElement.innerText = Math.floor(health);
                }

                // Hit no inimigo
                projectiles.forEach((p, pIndex) => {
                    const dist = Math.hypot(p.x - enemy.x, p.y - enemy.y);
                    if (dist - enemy.radius - p.radius < 1) {
                        score += 10;
                        scoreElement.innerText = score;
                        enemies.splice(eIndex, 1);
                        projectiles.splice(pIndex, 1);
                    }
                });
            });
        }
    </script>
</body>
</html>
